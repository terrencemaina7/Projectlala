<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6B5235" />
    <meta name="description" content="Lala Kenya — Hospitality & Nature's Goodness. Discover unique Kenyan stays: beach villas, safari tents, city escapes. Book with M-Pesa." />
    <title>Lala Kenya — Hospitality & Nature's Goodness</title>
    <!-- Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: #F8F6F0;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
      }
      /* Warm tuscan scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #F8F6F0; }
      ::-webkit-scrollbar-thumb { background: #A68B5B; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #6B5235; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
